<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICD-10 Parser · Clinical Validator</title>

  <!-- React + Babel via CDN -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:       #0a0c10;
      --surface:  #111318;
      --border:   #1e2330;
      --border2:  #2a3040;
      --text:     #c8d0e0;
      --muted:    #4a5568;
      --accent:   #00d9ff;
      --green:    #00ff9d;
      --red:      #ff4d6d;
      --amber:    #ffb347;
      --mono:     'IBM Plex Mono', monospace;
      --sans:     'IBM Plex Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    #root { position: relative; z-index: 1; }

    /* ── Layout ── */
    .shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .logo-box {
      width: 44px; height: 44px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-weight: 600;
      font-size: 13px;
      color: var(--bg);
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.5px;
    }
    .header-text p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      font-family: var(--mono);
    }

    .pipeline-badge {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }
    .pipeline-badge .stage {
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--border2);
      color: var(--muted);
      white-space: nowrap;
    }
    .pipeline-badge .stage.active {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 12px rgba(0,217,255,0.15);
    }
    .pipeline-badge .arrow { color: var(--border2); font-size: 10px; }

    /* ── Two-column layout ── */
    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 740px) { .grid2 { grid-template-columns: 1fr; } }

    /* ── Panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .panel-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .panel-title {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .panel-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      flex-shrink: 0;
    }
    .panel-body { padding: 20px; }

    /* ── Form controls ── */
    label {
      display: block;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    textarea, input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      padding: 12px 14px;
      resize: vertical;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    textarea:focus, input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0,217,255,0.1);
    }

    .form-group { margin-bottom: 20px; }

    /* ── Drop zone ── */
    .drop-zone {
      border: 1px dashed var(--border2);
      border-radius: 6px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: var(--bg);
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(0,217,255,0.03);
    }
    .drop-zone.has-file {
      border-color: var(--green);
      background: rgba(0,255,157,0.03);
    }

    .drop-zone-icon {
      font-size: 28px;
      margin-bottom: 10px;
      line-height: 1;
    }
    .drop-zone-text {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .drop-zone-hint {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--border2);
      letter-spacing: 0.5px;
    }
    .drop-zone-filename {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--green);
      margin-top: 8px;
    }

    input[type="file"] { display: none; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .tab {
      padding: 8px 16px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tab:hover:not(.active) { color: var(--text); }

    /* ── Button ── */
    .btn-primary {
      width: 100%;
      padding: 14px 20px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s, box-shadow 0.15s, transform 0.1s;
    }
    .btn-primary:hover:not(:disabled) {
      opacity: 0.9;
      box-shadow: 0 0 20px rgba(0,217,255,0.3);
    }
    .btn-primary:active:not(:disabled) { transform: scale(0.99); }
    .btn-primary:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* ── Signal display ── */
    .signal-panel {
      margin-top: 20px;
      border-radius: 8px;
      overflow: hidden;
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .signal-ok {
      border: 1px solid var(--green);
      background: rgba(0,255,157,0.04);
    }
    .signal-not-ok {
      border: 1px solid var(--red);
      background: rgba(255,77,109,0.04);
    }

    .signal-header {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid;
    }
    .signal-ok .signal-header { border-color: rgba(0,255,157,0.2); }
    .signal-not-ok .signal-header { border-color: rgba(255,77,109,0.2); }

    .signal-badge {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .signal-ok .signal-badge { color: var(--green); }
    .signal-not-ok .signal-badge { color: var(--red); }

    .signal-body { padding: 16px 18px; }

    .signal-field {
      margin-bottom: 12px;
    }
    .signal-field-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .signal-field-value {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      word-break: break-all;
    }
    .signal-field-value.green { color: var(--green); }
    .signal-field-value.red { color: var(--red); }
    .signal-field-value.amber { color: var(--amber); }

    /* ── Pipeline flow diagram ── */
    .flow {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 16px;
      padding: 14px 18px;
      background: var(--bg);
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .flow-node {
      padding: 5px 12px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.3px;
      border: 1px solid var(--border2);
      color: var(--muted);
      white-space: nowrap;
    }
    .flow-node.active {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 10px rgba(0,217,255,0.15);
    }
    .flow-node.done {
      border-color: var(--green);
      color: var(--green);
    }
    .flow-node.error {
      border-color: var(--red);
      color: var(--red);
    }
    .flow-arrow {
      color: var(--border2);
      font-size: 10px;
      font-family: var(--mono);
    }

    /* ── Instruction log ── */
    .log-entry {
      padding: 12px 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      margin-bottom: 10px;
      font-family: var(--mono);
      font-size: 11px;
    }
    .log-entry-id { color: var(--accent); margin-bottom: 4px; }
    .log-entry-instruction { color: var(--text); margin-bottom: 4px; word-break: break-word; }
    .log-entry-ts { color: var(--muted); font-size: 10px; }
    .log-empty { color: var(--muted); font-family: var(--mono); font-size: 12px; text-align: center; padding: 24px; }

    /* ── Loader ── */
    .loader {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid rgba(0,217,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .section-title {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    .hint-list {
      list-style: none;
      margin-top: 8px;
    }
    .hint-list li {
      font-size: 12px;
      color: var(--muted);
      padding: 3px 0;
      padding-left: 14px;
      position: relative;
      font-family: var(--mono);
    }
    .hint-list li::before {
      content: '›';
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    .status-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .status-dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.red   { background: var(--red);   box-shadow: 0 0 6px var(--red); }
    .status-dot.pulse {
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    .json-pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text);
      overflow-x: auto;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 300px;
      overflow-y: auto;
    }

    .key-green { color: var(--green); }
    .key-accent { color: var(--accent); }
    .key-amber  { color: var(--amber); }
    .key-red    { color: var(--red); }
    .key-muted  { color: var(--muted); }

    .refresh-btn {
      background: none;
      border: 1px solid var(--border2);
      border-radius: 4px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      padding: 4px 10px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      letter-spacing: 0.5px;
    }
    .refresh-btn:hover { color: var(--accent); border-color: var(--accent); }

    .full-width { grid-column: 1 / -1; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API_BASE = "http://localhost:5000";

// ── Syntax-coloured JSON display ─────────────────────────────────────────
function JsonView({ data }) {
  const colorize = (str) => {
    return str
      .replace(/"(status)":\s*"(OK)"/g,   '<span class="key-accent">"status"</span>: <span class="key-green">"OK"</span>')
      .replace(/"(status)":\s*"(NOT_OK)"/g,'<span class="key-accent">"status"</span>: <span class="key-red">"NOT_OK"</span>')
      .replace(/"(error)":/g,              '<span class="key-red">"error"</span>:')
      .replace(/"(instruction_id)":/g,     '<span class="key-accent">"instruction_id"</span>:')
      .replace(/"(forwarded)":\s*(true)/g, '<span class="key-accent">"forwarded"</span>: <span class="key-green">true</span>')
      .replace(/"(forwarded)":\s*(false)/g,'<span class="key-accent">"forwarded"</span>: <span class="key-red">false</span>')
      .replace(/"([^"]+)":/g,             '<span class="key-muted">"$1"</span>:');
  };

  return (
    <pre
      className="json-pre"
      dangerouslySetInnerHTML={{ __html: colorize(JSON.stringify(data, null, 2)) }}
    />
  );
}

// ── Pipeline flow indicator ───────────────────────────────────────────────
function PipelineFlow({ status }) {
  const nodes = [
    { id: "ui",     label: "UI" },
    { id: "parser", label: "Instruction Parser" },
    { id: "sft",    label: "Prompt Rewriter (SFT)" },
    { id: "llm",    label: "ICD-10 LLM" },
  ];

  const getState = (id) => {
    if (status === null)    return id === "ui" ? "active" : "";
    if (status === "OK")    return id === "ui" || id === "parser" ? "done" : id === "sft" ? "active" : "";
    if (status === "NOT_OK") return id === "ui" ? "done" : id === "parser" ? "error" : "";
    return "";
  };

  return (
    <div className="flow">
      {nodes.map((n, i) => (
        <React.Fragment key={n.id}>
          <div className={`flow-node ${getState(n.id)}`}>{n.label}</div>
          {i < nodes.length - 1 && <div className="flow-arrow">──›</div>}
        </React.Fragment>
      ))}
    </div>
  );
}

// ── Drop zone component ───────────────────────────────────────────────────
function DropZone({ file, onFile }) {
  const [dragOver, setDragOver] = useState(false);
  const inputRef = useRef();

  const handleDrop = useCallback((e) => {
    e.preventDefault();
    setDragOver(false);
    const f = e.dataTransfer.files[0];
    if (f) onFile(f);
  }, [onFile]);

  return (
    <div
      className={`drop-zone ${dragOver ? "drag-over" : ""} ${file ? "has-file" : ""}`}
      onClick={() => inputRef.current.click()}
      onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
      onDragLeave={() => setDragOver(false)}
      onDrop={handleDrop}
    >
      <div className="drop-zone-icon">{file ? "📄" : "⬆"}</div>
      <div className="drop-zone-text">
        {file ? "File attached" : "Drop file here or click to browse"}
      </div>
      {file ? (
        <div className="drop-zone-filename">{file.name} · {(file.size / 1024).toFixed(1)} KB</div>
      ) : (
        <div className="drop-zone-hint">ACCEPTED: .txt · .json · .csv</div>
      )}
      <input
        type="file"
        ref={inputRef}
        accept=".txt,.json,.csv"
        onChange={(e) => e.target.files[0] && onFile(e.target.files[0])}
      />
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────
function App() {
  const [instruction, setInstruction]   = useState("");
  const [file, setFile]                 = useState(null);
  const [manualNote, setManualNote]     = useState("");
  const [inputMode, setInputMode]       = useState("file");   // "file" | "text"
  const [loading, setLoading]           = useState(false);
  const [result, setResult]             = useState(null);
  const [instructions, setInstructions] = useState([]);
  const [logLoading, setLogLoading]     = useState(false);
  const [health, setHealth]             = useState(null);
  const [activeTab, setActiveTab]       = useState("submit");  // "submit" | "log"

  // ── Health check on mount ───────────────────────────────────────────────
  useEffect(() => {
    fetch(`${API_BASE}/api/health`)
      .then(r => r.json())
      .then(d => setHealth(d.status === "healthy" ? "ok" : "error"))
      .catch(() => setHealth("error"));
  }, []);

  // ── Fetch instruction log ───────────────────────────────────────────────
  const fetchInstructions = useCallback(() => {
    setLogLoading(true);
    fetch(`${API_BASE}/api/instructions`)
      .then(r => r.json())
      .then(d => setInstructions(d.instructions || []))
      .catch(() => {})
      .finally(() => setLogLoading(false));
  }, []);

  useEffect(() => {
    if (activeTab === "log") fetchInstructions();
  }, [activeTab, fetchInstructions]);

  // ── Submit ──────────────────────────────────────────────────────────────
  const handleSubmit = async () => {
    if (!instruction.trim()) return;

    setLoading(true);
    setResult(null);

    try {
      let response;

      if (inputMode === "file" && file) {
        // Multipart form — real file upload
        const form = new FormData();
        form.append("user_instruction", instruction.trim());
        form.append("clinical_document", file);
        response = await fetch(`${API_BASE}/api/validate`, { method: "POST", body: form });
      } else {
        // JSON body — manual text input (uses .txt as filename)
        const body = {
          user_instruction: instruction.trim(),
          filename: inputMode === "text" ? "clinical_note.txt" : (file ? file.name : "note.txt"),
          clinical_note: manualNote,
        };
        response = await fetch(`${API_BASE}/api/validate`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
      }

      const data = await response.json();
      setResult({ ...data, _httpStatus: response.status });
    } catch (err) {
      setResult({ status: "NOT_OK", error: "Network error: " + err.message, _httpStatus: 0 });
    } finally {
      setLoading(false);
    }
  };

  const canSubmit = instruction.trim().length > 0 &&
    (inputMode === "file" ? !!file : manualNote.trim().length >= 15);

  return (
    <div className="shell">
      {/* ── Header ── */}
      <div className="header">
        <div className="logo-box">ICD</div>
        <div className="header-text">
          <h1>Clinical ICD-10 Coding Pipeline</h1>
          <p>User Instruction Parser · Stage 1 of 4</p>
        </div>
        <div className="pipeline-badge">
          <span className={`status-dot ${health === "ok" ? "green" : health === null ? "pulse" : "red"}`} />
          <span style={{fontSize:11, fontFamily:"var(--mono)", color:"var(--muted)"}}>
            {health === "ok" ? "API CONNECTED" : health === null ? "CONNECTING" : "API OFFLINE"}
          </span>
        </div>
      </div>

      {/* ── Tabs ── */}
      <div className="tabs">
        <button className={`tab ${activeTab === "submit" ? "active" : ""}`} onClick={() => setActiveTab("submit")}>
          Submit Request
        </button>
        <button className={`tab ${activeTab === "log" ? "active" : ""}`} onClick={() => setActiveTab("log")}>
          Instruction Log
        </button>
      </div>

      {/* ── SUBMIT TAB ── */}
      {activeTab === "submit" && (
        <div className="grid2">
          {/* LEFT — Input form */}
          <div className="panel">
            <div className="panel-header">
              <div className="panel-dot" />
              <span className="panel-title">Request Input</span>
            </div>
            <div className="panel-body">
              {/* User instruction */}
              <div className="form-group">
                <label>User Instruction</label>
                <textarea
                  rows={4}
                  placeholder="e.g. Extract ICD-10 codes from the following discharge summary..."
                  value={instruction}
                  onChange={e => setInstruction(e.target.value)}
                />
                <ul className="hint-list">
                  <li>Must reference ICD-10 coding tasks</li>
                  <li>Must include an action verb (extract, generate, map…)</li>
                </ul>
              </div>

              {/* Input mode toggle */}
              <div className="form-group">
                <label>Clinical Document</label>
                <div style={{display:"flex", gap:8, marginBottom:12}}>
                  {["file","text"].map(mode => (
                    <button
                      key={mode}
                      onClick={() => setInputMode(mode)}
                      style={{
                        flex:1, padding:"7px 0",
                        background: inputMode === mode ? "rgba(0,217,255,0.1)" : "var(--bg)",
                        border: `1px solid ${inputMode === mode ? "var(--accent)" : "var(--border2)"}`,
                        borderRadius: 5,
                        color: inputMode === mode ? "var(--accent)" : "var(--muted)",
                        fontFamily: "var(--mono)", fontSize:11,
                        fontWeight: 500, letterSpacing:"0.8px", textTransform:"uppercase",
                        cursor:"pointer", transition:"all 0.15s"
                      }}
                    >
                      {mode === "file" ? "Upload File" : "Paste Text"}
                    </button>
                  ))}
                </div>

                {inputMode === "file" ? (
                  <DropZone file={file} onFile={setFile} />
                ) : (
                  <textarea
                    rows={7}
                    placeholder="Paste clinical note here (min 15 characters)..."
                    value={manualNote}
                    onChange={e => setManualNote(e.target.value)}
                  />
                )}
              </div>

              <button
                className="btn-primary"
                onClick={handleSubmit}
                disabled={!canSubmit || loading}
              >
                {loading ? <><span className="loader" />Validating…</> : "► Run Validation"}
              </button>
            </div>
          </div>

          {/* RIGHT — Results */}
          <div>
            <div className="panel">
              <div className="panel-header">
                <div className="panel-dot" style={{background: result ? (result.status === "OK" ? "var(--green)" : "var(--red)") : "var(--accent)"}} />
                <span className="panel-title">Validation Signal</span>
              </div>
              <div className="panel-body">
                {!result && !loading && (
                  <div style={{color:"var(--muted)", fontFamily:"var(--mono)", fontSize:12, textAlign:"center", padding:"32px 0"}}>
                    Awaiting submission…
                  </div>
                )}
                {loading && (
                  <div style={{color:"var(--accent)", fontFamily:"var(--mono)", fontSize:12, textAlign:"center", padding:"32px 0"}}>
                    <span className="loader" />Running validation checks…
                  </div>
                )}
                {result && (
                  <div className={`signal-panel ${result.status === "OK" ? "signal-ok" : "signal-not-ok"}`}>
                    <div className="signal-header">
                      <span className={`status-dot ${result.status === "OK" ? "green" : "red"}`} />
                      <span className="signal-badge">
                        {result.status === "OK" ? "✓ OK — Validated" : "✗ NOT_OK — Rejected"}
                      </span>
                    </div>
                    <div className="signal-body">
                      {result.status === "OK" ? (
                        <>
                          <div className="signal-field">
                            <div className="signal-field-label">Instruction ID (stored for ICD-10 LLM)</div>
                            <div className="signal-field-value green">{result.instruction_id}</div>
                          </div>
                          <div className="signal-field">
                            <div className="signal-field-label">Forward to Prompt Rewriter</div>
                            <div className="signal-field-value amber">
                              {result.forward_result?.simulated
                                ? "↳ Simulated (set PROMPT_REWRITER_URL to enable)"
                                : result.forward_result?.forwarded
                                  ? `↳ Sent to ${result.forward_result?.destination}`
                                  : `↳ Failed: ${result.forward_result?.error}`
                              }
                            </div>
                          </div>
                        </>
                      ) : (
                        <div className="signal-field">
                          <div className="signal-field-label">Error</div>
                          <div className="signal-field-value red">{result.error}</div>
                        </div>
                      )}

                      <div className="divider" />
                      <div className="section-title" style={{marginBottom:10}}>Raw Response</div>
                      <JsonView data={result} />
                    </div>
                  </div>
                )}
              </div>
            </div>

            {/* Pipeline flow */}
            <div style={{marginTop:16}}>
              <div className="section-title">Pipeline Position</div>
              <PipelineFlow status={result?.status ?? null} />
            </div>
          </div>
        </div>
      )}

      {/* ── LOG TAB ── */}
      {activeTab === "log" && (
        <div>
          <div className="panel">
            <div className="panel-header">
              <div className="panel-dot" />
              <span className="panel-title">Stored Instructions</span>
              <span style={{marginLeft:"auto", color:"var(--muted)", fontFamily:"var(--mono)", fontSize:11}}>
                {instructions.length} record{instructions.length !== 1 ? "s" : ""}
              </span>
              <button className="refresh-btn" style={{marginLeft:12}} onClick={fetchInstructions}>
                {logLoading ? "loading…" : "↻ refresh"}
              </button>
            </div>
            <div className="panel-body">
              <p style={{fontFamily:"var(--mono)", fontSize:11, color:"var(--muted)", marginBottom:16}}>
                These records are persisted in <span style={{color:"var(--accent)"}}>dataset/instruction_dataset.json</span> and consumed later by the ICD-10 LLM Coding Block.
              </p>
              {instructions.length === 0 ? (
                <div className="log-empty">No instructions stored yet. Submit a valid request to populate this log.</div>
              ) : (
                [...instructions].reverse().map(ins => (
                  <div key={ins.instruction_id} className="log-entry">
                    <div className="log-entry-id">{ins.instruction_id}</div>
                    <div className="log-entry-instruction">"{ins.user_instruction}"</div>
                    <div className="log-entry-ts">{ins.timestamp}</div>
                  </div>
                ))
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
